plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.daymark'
    compileSdk 34

    defaultConfig {
        applicationId 'com.example.daymark'
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }
}

dependencies {
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.security:security-crypto:1.0.0'
}
